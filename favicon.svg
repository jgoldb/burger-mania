<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Burger Mania favicon. Static, front-facing take on the in-game
       drawBurger(): sesame top bun, melting cheese, stacked patties, and a
       cylindrical bottom bun. Palette mirrors js/render.js exactly. -->
  <defs>
    <!-- top bun dome, lit from the upper-left like the radial gradient in game -->
    <radialGradient id="bm-top" cx="34%" cy="28%" r="78%">
      <stop offset="0"   stop-color="#ffd98f"/>
      <stop offset="0.5" stop-color="#e8a953"/>
      <stop offset="1"   stop-color="#9a6526"/>
    </radialGradient>
    <!-- bottom bun: horizontal gradient reads as a cylindrical body -->
    <linearGradient id="bm-bot" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0"    stop-color="#a9742f"/>
      <stop offset="0.42" stop-color="#f0bd6b"/>
      <stop offset="1"    stop-color="#8e5f24"/>
    </linearGradient>
    <linearGradient id="bm-patty" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0"    stop-color="#3a1d0c"/>
      <stop offset="0.42" stop-color="#7a4423"/>
      <stop offset="1"    stop-color="#33180a"/>
    </linearGradient>
    <linearGradient id="bm-cheese" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0"    stop-color="#c79212"/>
      <stop offset="0.42" stop-color="#ffd84d"/>
      <stop offset="1"    stop-color="#b8860d"/>
    </linearGradient>
  </defs>

  <!-- bottom bun -->
  <rect x="7" y="46" width="50" height="13" rx="6" fill="url(#bm-bot)"/>
  <ellipse cx="32" cy="48.5" rx="22" ry="1.7" fill="#ffebbe" opacity="0.35"/>

  <!-- lower patty + its cheese layer with drips -->
  <rect x="5"  y="40" width="54" height="8" rx="3.5" fill="url(#bm-patty)"/>
  <path d="M6 39 h52 v3 q-6 4 -13 0 q-7 4 -13 0 q-7 4 -13 0 q-7 4 -13 0 z"
        fill="url(#bm-cheese)"/>

  <!-- upper patty + its cheese layer with drips -->
  <rect x="5"  y="32" width="54" height="8" rx="3.5" fill="url(#bm-patty)"/>
  <path d="M6 31 h52 v3 q-6 4 -13 0 q-7 4 -13 0 q-7 4 -13 0 q-7 4 -13 0 z"
        fill="url(#bm-cheese)"/>

  <!-- top bun dome -->
  <path d="M8 31 q0 -24 24 -24 q24 0 24 24 z" fill="url(#bm-top)"/>
  <rect x="8" y="29.5" width="48" height="2.5" fill="#9a6526"/>

  <!-- sesame seeds scattered across the dome -->
  <g fill="#fdf3d3">
    <ellipse cx="22" cy="22" rx="2.2" ry="1.2" transform="rotate(-22 22 22)"/>
    <ellipse cx="32" cy="16" rx="2.2" ry="1.2" transform="rotate(6 32 16)"/>
    <ellipse cx="43" cy="21" rx="2.2" ry="1.2" transform="rotate(24 43 21)"/>
    <ellipse cx="27" cy="27"  rx="2"   ry="1.1" transform="rotate(-12 27 27)"/>
    <ellipse cx="38" cy="27"  rx="2"   ry="1.1" transform="rotate(14 38 27)"/>
    <ellipse cx="32" cy="24"  rx="2"   ry="1.1" transform="rotate(-3 32 24)"/>
  </g>

  <!-- sweeping dome glint -->
  <ellipse cx="24" cy="15" rx="4" ry="2" transform="rotate(-28 24 15)" fill="#ffffff" opacity="0.30"/>
</svg>

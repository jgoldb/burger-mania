<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Burger Mania">
<meta name="theme-color" content="#1a0f06">
<title>Burger Mania</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="manifest" href="manifest.webmanifest">
<!-- iOS ignores the web manifest's icons for Add to Home Screen; it uses this
     PNG instead (SVG apple-touch-icons aren't supported there). -->
<link rel="apple-touch-icon" href="assets/apple-touch-icon.png">
<style>
  html, body { margin: 0; height: 100%; background: #000; overflow: hidden;
               overscroll-behavior: none; }
  /* Pin the canvas to the visual viewport so it always covers the screen
     edge to edge (with viewport-fit=cover, that includes under the notch and
     home indicator) — no black gutters in landscape. The UI insets itself
     from the safe areas in JS so controls stay clear of those cutouts. */
  canvas { display: block; position: fixed; inset: 0;
           width: 100%; height: 100%; touch-action: none;
           -webkit-user-select: none; user-select: none;
           -webkit-touch-callout: none;
           -webkit-tap-highlight-color: transparent; }

  /* The game is built for a wide view, so on a phone held upright we cover
     it with a "rotate to landscape" prompt. Gated on a coarse pointer so it
     only ever shows on touch devices, never a portrait desktop window. */
  #rotate { display: none; }
  @media (orientation: portrait) and (pointer: coarse) {
    #rotate {
      display: flex; position: fixed; inset: 0; z-index: 10;
      flex-direction: column; align-items: center; justify-content: center;
      gap: 24px; background: #1a0f06; color: #f9c623;
      font: bold 21px/1.5 "Consolas","Courier New",monospace;
      text-align: center; padding: 0 28px;
      -webkit-user-select: none; user-select: none;
    }
    #rotate .phone {
      width: 54px; height: 96px; border: 5px solid #f9c623; border-radius: 13px;
      position: relative; animation: bm-rotate 2.4s ease-in-out infinite;
    }
    /* speaker slit, to read as a phone rather than a plain box */
    #rotate .phone::before {
      content: ''; position: absolute; top: 7px; left: 50%;
      width: 16px; height: 4px; margin-left: -8px; border-radius: 2px;
      background: #f9c623;
    }
    #rotate p { margin: 0; color: #f0e8da; }
  }
  @keyframes bm-rotate {
    0%, 28%   { transform: rotate(0deg); }
    55%, 100% { transform: rotate(90deg); }
  }
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="rotate">
  <div class="phone"></div>
  <p>Rotate your device<br>to landscape to play</p>
</div>
<!-- These URLs stay query-free in source. The Pages deploy workflow
     (.github/workflows/deploy.yml) stamps a ?v=<commit> cache-busting token
     onto them in the published build, so a new deploy never serves stale
     cached JS. To stamp a build by hand: node tools/stamp-version.js -->
<script src="js/assets.js"></script>
<script src="js/levels.js"></script>
<script src="js/physics.js"></script>
<script src="js/render.js"></script>
<script src="js/music.js"></script>
<script src="js/replay.js"></script>
<script src="js/touch.js"></script>
<script src="js/editor.js"></script>
<script src="js/game.js"></script>
<!-- Register the service worker (offline play + installable PWA). Only runs on
     http/https; opening index.html off disk (file://) silently no-ops.

     Auto-update flow (works with the ?v= cache-busting, doesn't replace it):
     every deploy ships a byte-different sw.js (BUILD = commit SHA). We poll for
     it, let the new worker install and *wait*, then tell it to activate and
     reload the page — but only at a moment that won't discard an active ride
     (on a menu/victory screen, or while the app is backgrounded). See
     window.__bmSafeToReload in js/game.js. -->
<script>
(function () {
  if (!('serviceWorker' in navigator) || !location.protocol.startsWith('http')) return;
  var sw = navigator.serviceWorker;

  // Local development (localhost / 127.0.0.1 / ::1): never run a service worker.
  // Its offline cache pins stale JS and maps, so a plain reload after an edit
  // looks like it did nothing. Tear down any worker a prior dev session (or a
  // visit to the production origin under the same host) left behind, drop its
  // caches, and bail before registering a new one. The one-time reload only
  // fires when a controller was actually in charge, so it can't loop: after it,
  // there are no registrations left to find.
  var host = location.hostname;
  if (host === 'localhost' || host === '127.0.0.1' || host === '[::1]' || host === '::1' || host === '0.0.0.0') {
    sw.getRegistrations().then(function (regs) {
      Promise.all(regs.map(function (reg) { return reg.unregister(); })).then(function () {
        if (regs.length && sw.controller) location.reload();
      });
    }).catch(function () {});
    if (window.caches && caches.keys) {
      caches.keys().then(function (keys) {
        keys.forEach(function (k) { caches.delete(k); });
      }).catch(function () {});
    }
    return;
  }

  var hadController = !!sw.controller;  // false on the very first visit
  var waiting = null;                   // a new worker that's installed & waiting
  var poll = null;
  var reloading = false;

  // The new worker taking control is our cue to reload into it. Guard against
  // the first-ever install (no prior controller) so a fresh visit doesn't bounce,
  // and against firing twice.
  sw.addEventListener('controllerchange', function () {
    if (!hadController || reloading) return;
    reloading = true;
    location.reload();
  });

  // Safe to swap when backgrounded, or when the game says no run is at stake.
  function safe() {
    var pred = window.__bmSafeToReload;
    return document.hidden || (typeof pred === 'function' && pred());
  }
  function apply() {
    if (!waiting || !safe()) return;
    // Leave a per-tab breadcrumb so the reloaded page knows this was our update
    // swap (not a manual refresh) and can skip the tap-to-start overlay + revive
    // audio. sessionStorage survives the reload and clears when the tab closes.
    try { sessionStorage.setItem('bm-swReload', '1'); } catch (e) {}
    waiting.postMessage({ type: 'SKIP_WAITING' });
  }
  function ready(worker) {
    waiting = worker;
    apply();                                    // swap now if it's already safe…
    if (!poll) poll = setInterval(apply, 2000); // …otherwise keep checking
  }

  // Re-evaluate whenever visibility flips (becoming hidden is always safe).
  document.addEventListener('visibilitychange', apply);

  addEventListener('load', function () {
    sw.register('sw.js').then(function (reg) {
      // A worker that finished installing before this page loaded.
      if (reg.waiting && sw.controller) ready(reg.waiting);
      // …or one that installs while we're open.
      reg.addEventListener('updatefound', function () {
        var nw = reg.installing;
        if (!nw) return;
        nw.addEventListener('statechange', function () {
          if (nw.state === 'installed' && sw.controller) ready(nw);
        });
      });
      // An installed PWA can stay open for days without re-navigating, so nudge
      // the browser to look for a new build every few minutes and each time we're
      // refocused. (reg.update() refetches sw.js bypassing the HTTP cache, so it's
      // a tiny request — a tighter cadence just shortens the worst-case lag between
      // a deploy landing and the tab picking it up.)
      setInterval(function () { reg.update().catch(function () {}); }, 3e5);
      document.addEventListener('visibilitychange', function () {
        if (!document.hidden) reg.update().catch(function () {});
      });
    }).catch(function () {});
  });
})();
</script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  html, body { margin: 0; height: 100%; background: #000; overflow: hidden; }
  canvas { display: block; }
</style>
</head>
<body>
<canvas id="game"></canvas>
<script src="../js/assets.js"></script>
<script src="../js/levels.js"></script>
<script src="../js/physics.js"></script>
<script src="../js/render.js"></script>
<script>
  // statically renders one UI screen
  // (?ui=menu|difficulty|continue|pause|audio|audio-pause|skip|skip-game|victory|...)
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const params = new URLSearchParams(location.search);
  // ?w=&h= force a specific viewport (e.g. a phone's landscape size) without
  // resizing the window; otherwise fill the window
  const W = canvas.width = parseInt(params.get('w') || '', 10) || window.innerWidth;
  const H = canvas.height = parseInt(params.get('h') || '', 10) || window.innerHeight;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  // ?inset=T,R,B,L (or a single number for all sides) simulates a notch /
  // home-indicator so the safe-area-aware chrome can be eyeballed in landscape
  if (params.get('inset')) {
    const v = params.get('inset').split(',').map(Number);
    const i = v.length === 1
      ? { top: v[0], right: v[0], bottom: v[0], left: v[0] }
      : { top: v[0] || 0, right: v[1] || 0, bottom: v[2] || 0, left: v[3] || 0 };
    setSafeInsets(i);
    window.__inset = i;
  }
  const patterns = makePatterns(ctx);
  const ui = params.get('ui') || 'menu';
  // optional ?theme= to preview menu screens in another world
  const menuPat = patterns[params.get('theme')] || patterns.meadow;

  // manifest paths are relative to the page; this page lives in test/
  ASSET_MANIFEST.images.biker = '../assets/biker.webp';

  loadAssets().then(() => {
  if (ui === 'menu') {
    // ?t= scrubs the backdrop clock (seconds since the menu opened); the
    // astro gag is held back 30s, so the default clears that delay and lands
    // mid-ascent so the rising-astronaut gag and its bubble show in the still
    const t = params.get('t') ? parseFloat(params.get('t')) : 35.7;
    drawMenuBackdrop(ctx, W, H, t, menuPat, true);
    drawTitleLetters(ctx, W, H, 10);
    drawMenu(ctx, W, H, 1, ['Play'], 0, -1);
  } else if (ui === 'difficulty') {
    drawMenuBackdrop(ctx, W, H, 2.0, menuPat);
    drawDifficulty(ctx, W, H, 1, TRACKS, 0, -1);
  } else if (ui === 'continue') {
    drawMenuBackdrop(ctx, W, H, 2.0, menuPat);
    drawContinue(ctx, W, H, 1, 2.0, 2, 0, -1);
  } else if (ui === 'continue-out') {
    drawMenuBackdrop(ctx, W, H, 2.0, menuPat);
    drawContinue(ctx, W, H, 1, 2.0, 0, 1, -1);
  } else if (ui === 'map') {
    // whole-level overview: ?ui=map&i=<level index>
    const idx = parseInt(params.get('i') || '0', 10);
    const level = prepareLevel(LEVELS[idx]);
    const xs = level.polygons[0].map(p => p[0]), ys = level.polygons[0].map(p => p[1]);
    const x0 = Math.min(...xs) - 1, x1 = Math.max(...xs) + 1;
    const y0 = Math.min(...ys) - 1, y1 = Math.max(...ys) + 1;
    const Z = Math.min(W / (x1 - x0), H / (y1 - y0));
    ctx.save();
    ctx.scale(Z, Z);
    ctx.translate(-x0, -y0);
    drawWorld(ctx, level, patterns[level.theme] || patterns.meadow, { x0, y0, x1, y1 }, 2.0);
    for (const b of level.burgers) drawBurger(ctx, b[0], b[1], 1);
    drawPopcorn(ctx, level.goal[0], level.goal[1], 1);
    const bike = new Bike(level.start.x, level.start.y);
    drawBike(ctx, bike, false);
    ctx.restore();
  } else if (ui === 'sprites') {
    // burger and popcorn close-ups at several animation times
    // (override the sample times with ?ts=0.1,0.5,...)
    ctx.fillStyle = '#9ad0ee';
    ctx.fillRect(0, 0, W, H);
    const ts = params.get('ts')
      ? params.get('ts').split(',').map(Number) : [0.0, 0.7, 1.4, 2.1];
    const cw = W / ts.length;
    for (let i = 0; i < ts.length; i++) {
      ctx.save();
      ctx.translate(cw * (i + 0.5), H * 0.27);
      ctx.scale(cw / 2.4, cw / 2.4);
      drawBurger(ctx, 0, 0, ts[i]);
      ctx.restore();
      ctx.save();
      ctx.translate(cw * (i + 0.5), H * 0.75);
      ctx.scale(cw / 2.4, cw / 2.4);
      drawPopcorn(ctx, 0, -0.1, ts[i]);
      ctx.restore();
    }
  } else if (ui === 'ready') {
    const level = prepareLevel(LEVELS[1]);
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, W, H);
    drawHUD(ctx, W, H, {
      time: 0, got: 0, total: 6, best: null, state: 'ready', lives: 3,
      mapLabel: 'Easy 2/10 - Cheddar Canyon',
    });
  } else if (ui === 'audio') {
    drawMenuBackdrop(ctx, W, H, 2.0, menuPat);
    drawAudio(ctx, W, H, 1, {
      volume: { master: 0.8, music: 0.55, sfx: 1 },
      sel: 1, hover: -1, dim: false, muted: false,
    });
  } else if (ui === 'pause' || ui === 'audio-pause') {
    const level = prepareLevel(LEVELS[0]);
    const bike = new Bike(level.start.x, level.start.y);
    const Z = Math.min(W / 26, H / 13.5);
    ctx.save();
    ctx.translate(W / 2, H / 2);
    ctx.scale(Z, Z);
    ctx.translate(-level.start.x, -level.start.y);
    const hw = W / 2 / Z + 1, hh = H / 2 / Z + 1;
    drawWorld(ctx, level, patterns[level.theme] || patterns.meadow, {
      x0: level.start.x - hw, y0: level.start.y - hh,
      x1: level.start.x + hw, y1: level.start.y + hh,
    }, 2.0);
    for (const b of level.burgers) drawBurger(ctx, b[0], b[1], 1);
    drawBike(ctx, bike, false);
    ctx.restore();
    drawHUD(ctx, W, H, { time: 12.34, got: 2, total: 5, best: null, state: 'paused', lives: 2 });
    if (ui === 'pause') {
      drawPause(ctx, W, H, ['Continue', 'Audio', 'Return to Menu'], 0, -1);
    } else {
      drawAudio(ctx, W, H, 1, {
        volume: { master: 0.8, music: 0.55, sfx: 1 },
        sel: 0, hover: -1, dim: true, muted: false,
      });
    }
  } else if (ui === 'skip' || ui === 'skip-game') {
    // the "skip" cheat's level picker, over a menu backdrop or, with
    // ?ui=skip-game, floating over a frozen level like the pause menu
    const track = TRACKS[0];
    const items = track.levels.map((raw, i) => ({
      label: raw.name, sub: 'Map ' + (i + 1) + '/' + track.length,
    }));
    if (ui === 'skip-game') {
      const level = prepareLevel(LEVELS[0]);
      const bike = new Bike(level.start.x, level.start.y);
      const Z = Math.min(W / 26, H / 13.5);
      ctx.save();
      ctx.translate(W / 2, H / 2);
      ctx.scale(Z, Z);
      ctx.translate(-level.start.x, -level.start.y);
      const hw = W / 2 / Z + 1, hh = H / 2 / Z + 1;
      drawWorld(ctx, level, patterns[level.theme] || patterns.meadow, {
        x0: level.start.x - hw, y0: level.start.y - hh,
        x1: level.start.x + hw, y1: level.start.y + hh,
      }, 2.0);
      for (const b of level.burgers) drawBurger(ctx, b[0], b[1], 1);
      drawBike(ctx, bike, false);
      ctx.restore();
      drawHUD(ctx, W, H, { time: 12.34, got: 2, total: 5, best: null, state: 'paused', lives: 2 });
    } else {
      drawMenuBackdrop(ctx, W, H, 2.0, menuPat);
    }
    drawLevelSelect(ctx, W, H, 1, {
      items, sel: 2, scroll: 0, hover: -1, label: track.label, touch: false,
    });
  } else if (ui === 'victory') {
    // the track-cleared feast; ?t= scrubs the shovel/scenery clock
    const t = params.get('t') ? parseFloat(params.get('t')) : 2.0;
    const track = TRACKS[0];
    const results = track.levels.map((raw, i) => ({
      time: 20 + i * 13.37, style: 250 * i,
      timeRecord: i % 3 === 0, styleRecord: i % 4 === 2,
    }));
    drawVictory(ctx, W, H, {
      t, pat: menuPat, label: track.label,
      names: track.levels.map(l => l.name),
      results, sel: 0, hover: -1, touch: false, saveNote: 'S: save replay',
    });
  }
  // outline the safe band so it's obvious whether the chrome respects it
  if (window.__inset) {
    const i = window.__inset;
    ctx.save();
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.strokeStyle = 'rgba(255,64,64,0.9)';
    ctx.setLineDash([8, 6]);
    ctx.lineWidth = 2;
    ctx.strokeRect(i.left, i.top, W - i.left - i.right, H - i.top - i.bottom);
    ctx.restore();
  }
  });
</script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  html, body { margin: 0; height: 100%; background: #000; overflow: hidden; }
  canvas { display: block; }
</style>
</head>
<body>
<canvas id="game"></canvas>
<script src="../js/assets.js"></script>
<script src="../js/levels.js"></script>
<script src="../js/physics.js"></script>
<script src="../js/render.js"></script>
<script>
  // statically renders one UI screen (?ui=menu|difficulty|continue|pause)
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const W = canvas.width = window.innerWidth;
  const H = canvas.height = window.innerHeight;
  const patterns = makePatterns(ctx);
  const ui = new URLSearchParams(location.search).get('ui') || 'menu';

  // manifest paths are relative to the page; this page lives in test/
  ASSET_MANIFEST.images.biker = '../assets/biker.png';

  loadAssets().then(() => {
  if (ui === 'menu') {
    drawMenuBackdrop(ctx, W, H, 2.0, patterns.meadow);
    drawTitleLetters(ctx, W, H, 10);
    drawMenu(ctx, W, H, 1, ['Play'], 0, -1);
  } else if (ui === 'difficulty') {
    drawMenuBackdrop(ctx, W, H, 2.0, patterns.meadow);
    drawDifficulty(ctx, W, H, 1, TRACKS, 0, -1);
  } else if (ui === 'continue') {
    drawMenuBackdrop(ctx, W, H, 2.0, patterns.meadow);
    drawContinue(ctx, W, H, 1, 2.0, 3, 0, -1);
  } else if (ui === 'continue-out') {
    drawMenuBackdrop(ctx, W, H, 2.0, patterns.meadow);
    drawContinue(ctx, W, H, 1, 2.0, 0, 1, -1);
  } else if (ui === 'map') {
    // whole-level overview: ?ui=map&i=<level index>
    const idx = parseInt(new URLSearchParams(location.search).get('i') || '0', 10);
    const level = prepareLevel(LEVELS[idx]);
    const xs = level.polygons[0].map(p => p[0]), ys = level.polygons[0].map(p => p[1]);
    const x0 = Math.min(...xs) - 1, x1 = Math.max(...xs) + 1;
    const y0 = Math.min(...ys) - 1, y1 = Math.max(...ys) + 1;
    const Z = Math.min(W / (x1 - x0), H / (y1 - y0));
    ctx.save();
    ctx.scale(Z, Z);
    ctx.translate(-x0, -y0);
    drawWorld(ctx, level, patterns[level.theme] || patterns.meadow, { x0, y0, x1, y1 });
    for (const b of level.burgers) drawBurger(ctx, b[0], b[1], 1);
    drawPopcorn(ctx, level.goal[0], level.goal[1], 1);
    const bike = new Bike(level.start.x, level.start.y);
    drawBike(ctx, bike, false);
    ctx.restore();
  } else if (ui === 'ready') {
    const level = prepareLevel(LEVELS[1]);
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, W, H);
    drawHUD(ctx, W, H, {
      time: 0, got: 0, total: 6, best: null, state: 'ready', lives: 3,
      mapLabel: 'Easy 2/10 - Cheddar Canyon',
    });
  } else if (ui === 'pause') {
    const level = prepareLevel(LEVELS[0]);
    const bike = new Bike(level.start.x, level.start.y);
    const Z = Math.min(W / 26, H / 13.5);
    ctx.save();
    ctx.translate(W / 2, H / 2);
    ctx.scale(Z, Z);
    ctx.translate(-level.start.x, -level.start.y);
    const hw = W / 2 / Z + 1, hh = H / 2 / Z + 1;
    drawWorld(ctx, level, patterns[level.theme] || patterns.meadow, {
      x0: level.start.x - hw, y0: level.start.y - hh,
      x1: level.start.x + hw, y1: level.start.y + hh,
    });
    for (const b of level.burgers) drawBurger(ctx, b[0], b[1], 1);
    drawBike(ctx, bike, false);
    ctx.restore();
    drawHUD(ctx, W, H, { time: 12.34, got: 2, total: 5, best: null, state: 'paused', lives: 2 });
    drawPause(ctx, W, H, ['Continue', 'Return to Menu'], 0, -1);
  }
  });
</script>
</body>
</html>
